<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鬼杀队 AI 总部</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --primary-orange: #ff6b35;
            --primary-cyan: #00f5d4;
            --primary-purple: #b388ff;
            --text-color: #ffffff;
            --font-pixel: 'Press Start 2P', cursive;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-pixel);
            overflow-x: hidden;
            line-height: 1.6;
            font-size: 12px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .section {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            scroll-snap-align: start;
        }

        #app {
            height: 100vh;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
        }

        .pixel-text {
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 20px;
        }

        .pixel-border {
            border: 4px solid #fff;
            box-shadow: 
                0 -4px 0 -4px #fff,
                0 4px 0 -4px #fff,
                -4px 0 0 -4px #fff,
                4px 0 0 -4px #fff,
                0 -8px 0 -4px #000,
                0 8px 0 -4px #000,
                -8px 0 0 -4px #000,
                8px 0 0 -4px #000,
                0 -12px 0 -8px #fff,
                0 12px 0 -8px #fff,
                -12px 0 0 -8px #fff,
                12px 0 0 -8px #fff;
            background: var(--bg-color);
            padding: 20px;
        }

        /* Hero Section */
        #hero h1 { font-size: 3rem; color: var(--primary-orange); text-shadow: 4px 4px var(--primary-purple); }
        #hero h2 { font-size: 1.2rem; color: var(--primary-cyan); }
        #hero .description { margin-top: 40px; font-size: 0.8rem; opacity: 0.8; }
        .glitched { animation: glitch 1s infinite; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        .scroll-indicator { position: absolute; bottom: 30px; animation: bounce 2s infinite; font-size: 0.6rem; color: var(--primary-purple); }

        /* Team Orbit */
        .team-orbit { position: relative; width: 600px; height: 600px; display: flex; justify-content: center; align-items: center; }
        .pillar-card { 
            position: absolute; width: 100px; height: 120px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s;
            background: rgba(255,255,255,0.05);
            border: 2px solid #333;
            z-index: 10;
        }
        .pillar-card:hover { transform: scale(1.1); border-color: var(--primary-cyan); box-shadow: 0 0 15px var(--primary-cyan); }
        .pillar-card .emoji { font-size: 2rem; margin-bottom: 10px; }
        .pillar-card .name { font-size: 0.6rem; text-align: center; }
        
        .pillar-card.central { width: 120px; height: 140px; border-color: var(--primary-orange); box-shadow: 0 0 20px var(--primary-orange); }

        #connections-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        /* Detail Panel */
        #detail-panel { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 80%; max-width: 500px; z-index: 100;
        }
        .hidden { display: none; }
        .close-btn { position: absolute; right: 10px; top: 10px; background: none; border: none; color: #fff; font-family: var(--font-pixel); cursor: pointer; }

        /* Workflow */
        .flow-container { width: 90%; max-width: 800px; }
        .flow-steps { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 40px; }
        .flow-step { padding: 10px; border: 2px solid #333; font-size: 0.6rem; opacity: 0.5; transition: all 0.5s; }
        .flow-step.active { opacity: 1; border-color: var(--primary-cyan); box-shadow: 0 0 10px var(--primary-cyan); transform: scale(1.1); }

        /* Chat UI */
        .chat-container { width: 100%; max-width: 600px; height: 400px; overflow-y: auto; padding: 20px; }
        .chat-bubble { margin-bottom: 15px; max-width: 80%; padding: 10px; border: 2px solid #444; position: relative; }
        .chat-bubble.master { align-self: flex-start; border-color: var(--primary-orange); }
        .chat-bubble.ai { align-self: flex-end; border-color: var(--primary-cyan); margin-left: auto; }
        .bubble-name { font-size: 0.5rem; color: var(--primary-purple); margin-bottom: 5px; }
        .bubble-text { font-size: 0.7rem; }

        .pixel-btn {
            background: var(--primary-orange);
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-family: var(--font-pixel);
            cursor: pointer;
            box-shadow: 4px 4px 0 #8a3a1d;
        }
        .pixel-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #8a3a1d; }

        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            #hero h1 { font-size: 1.5rem; }
            .team-orbit { width: 350px; height: 350px; }
            .pillar-card { width: 70px; height: 90px; }
            .pillar-card .emoji { font-size: 1.2rem; }
            .pillar-card .name { font-size: 0.4rem; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Section 1: Hero -->
        <section id="hero" class="section active">
            <div class="container">
                <h1 class="pixel-text glitched">鬼杀队 AI 总部</h1>
                <h2 class="pixel-text">由 AI 驱动的超级团队</h2>
                <p class="description">主公一人指挥，9 个 AI 协作完成一切</p>
                <div class="scroll-indicator">SCROLL DOWN</div>
            </div>
        </section>

        <!-- Section 2: Team Overview -->
        <section id="team" class="section">
            <div class="container">
                <h2 class="pixel-text section-title">团队全貌</h2>
                <div class="team-orbit">
                    <div id="central-node" class="pillar-card central">
                        <span class="emoji">🌸</span>
                        <div class="name">天音</div>
                    </div>
                    <div class="pillars-container">
                        <!-- Pillars will be injected by JS -->
                    </div>
                </div>
                <div id="detail-panel" class="pixel-border hidden">
                    <button class="close-btn">X</button>
                    <div class="detail-content"></div>
                </div>
                <canvas id="connections-canvas"></canvas>
            </div>
        </section>

        <!-- Section 3: Workflow -->
        <section id="workflow" class="section">
            <div class="container">
                <h2 class="pixel-text section-title">任务流转</h2>
                <div class="flow-container">
                    <div class="flow-steps">
                        <!-- Steps injected by JS -->
                    </div>
                    <button id="play-workflow" class="pixel-btn">播放动画</button>
                </div>
            </div>
        </section>

        <!-- Section 4: Equipment -->
        <section id="equipment" class="section">
            <div class="container">
                <h2 class="pixel-text section-title">武器装备</h2>
                <div class="model-cards">
                    <div class="model-card pixel-border sonnet">
                        <h3>Claude Sonnet</h3>
                        <p>快速响应柱</p>
                        <ul class="pillar-list"></ul>
                    </div>
                    <div class="model-card pixel-border opus">
                        <h3>Claude Opus</h3>
                        <p>深度思考柱</p>
                        <ul class="pillar-list"></ul>
                    </div>
                </div>
            </div>
        </section>

        <!-- Section 5: Real Case -->
        <section id="case" class="section">
            <div class="container">
                <h2 class="pixel-text section-title">实战演练</h2>
                <div class="chat-container pixel-border">
                    <div id="chat-messages"></div>
                </div>
            </div>
        </section>
    </div>
    <script>
        const pillars = [
            { id: 'kasumi', emoji: '🌫️', name: '霞柱·無一郎', role: '需求探索', description: '把模糊想法变成清晰目标', model: 'Claude 3.5 Sonnet', traits: '敏捷、洞察力极强' },
            { id: 'shinobu', emoji: '🦋', name: '蟲柱·忍', role: '产品经理', description: '拆解任务、分配模型', model: 'Claude 3.5 Sonnet', traits: '细致、逻辑严密' },
            { id: 'rengoku', emoji: '🔥', name: '炎柱·煉獄', role: '写作专家', description: '邮件/PPT/文案', model: 'Claude 3.5 Sonnet', traits: '热情、文采斐然' },
            { id: 'tanjiro', emoji: '⚔️', name: '炭治郎', role: '代码经理', description: '开发/技术/工程', model: 'Claude 3.5 Opus (Thinking)', traits: '稳重、解决复杂问题' },
            { id: 'iguro', emoji: '🐍', name: '蛇柱·伊黑', role: '数据分析', description: '数据分析 + 量化策略', model: 'Claude 3.5 Sonnet', traits: '精准、目光敏锐' },
            { id: 'sanemi', emoji: '💨', name: '风柱·実弥', role: '系统操控', description: '自动化 + 系统操控', model: 'Claude 3.5 Sonnet', traits: '暴力高效、执行力强' },
            { id: 'giyu', emoji: '💧', name: '水柱·义勇', role: '审核验证', description: '所有成果的最后把关', model: 'Claude 3.5 Opus (Thinking)', traits: '冷静、追求完美' },
            { id: 'yoruichi', emoji: '☀️', name: '继国缘一', role: '至高战略', description: '重大决策的最终裁量', model: 'Claude 3.5 Opus (Thinking)', traits: '神级逻辑、降维打击' }
        ];

        const container = document.querySelector('.pillars-container');
        const orbitRadius = window.innerWidth > 768 ? 220 : 130;
        
        // Render Pillars in Orbit
        pillars.forEach((p, i) => {
            const angle = (i / pillars.length) * Math.PI * 2;
            const x = Math.cos(angle) * orbitRadius;
            const y = Math.sin(angle) * orbitRadius;
            
            const div = document.createElement('div');
            div.className = 'pillar-card';
            div.style.left = `calc(50% + ${x}px - 50px)`;
            div.style.top = `calc(50% + ${y}px - 60px)`;
            div.innerHTML = `<span class="emoji">${p.emoji}</span><div class="name">${p.name}</div>`;
            div.onclick = () => showDetail(p);
            container.appendChild(div);
        });

        // Connections Canvas
        const canvas = document.getElementById('connections-canvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() {
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = canvas.parentElement.offsetHeight;
        }
        window.onresize = resizeCanvas;
        resizeCanvas();

        function drawConnections() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const central = document.getElementById('central-node').getBoundingClientRect();
            const parent = canvas.parentElement.getBoundingClientRect();
            const cx = central.left + central.width / 2 - parent.left;
            const cy = central.top + central.height / 2 - parent.top;

            const cards = document.querySelectorAll('.pillars-container .pillar-card');
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const tx = rect.left + rect.width / 2 - parent.left;
                const ty = rect.top + rect.height / 2 - parent.top;

                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(tx, ty);
                ctx.strokeStyle = `rgba(0, 245, 212, ${0.2 + Math.random() * 0.3})`;
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Pulsing dot
                const time = Date.now() * 0.002;
                const pulseX = cx + (tx - cx) * (Math.sin(time) * 0.5 + 0.5);
                const pulseY = cy + (ty - cy) * (Math.sin(time) * 0.5 + 0.5);
                ctx.beginPath();
                ctx.arc(pulseX, pulseY, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#ff6b35';
                ctx.fill();
            });
            requestAnimationFrame(drawConnections);
        }
        drawConnections();

        function showDetail(p) {
            const panel = document.getElementById('detail-panel');
            panel.querySelector('.detail-content').innerHTML = `
                <h3 style="color:var(--primary-orange);margin-bottom:15px;">${p.emoji} ${p.name}</h3>
                <p><strong>职责:</strong> ${p.role}</p>
                <p><strong>说明:</strong> ${p.description}</p>
                <p><strong>模型:</strong> ${p.model}</p>
                <p><strong>特点:</strong> ${p.traits}</p>
            `;
            panel.classList.remove('hidden');
        }

        document.querySelector('.close-btn').onclick = () => {
            document.getElementById('detail-panel').classList.add('hidden');
        };

        // Workflow Animation
        const workflowSteps = [
            '主公下令', '天音判断', '分派给柱', '柱执行任务', '汇报进度(30/60/90%)', '义勇审核', '天音交付'
        ];
        const flowContainer = document.querySelector('.flow-steps');
        workflowSteps.forEach(step => {
            const div = document.createElement('div');
            div.className = 'flow-step';
            div.innerText = step;
            flowContainer.appendChild(div);
        });

        document.getElementById('play-workflow').onclick = async function() {
            const steps = document.querySelectorAll('.flow-step');
            for (let step of steps) {
                steps.forEach(s => s.classList.remove('active'));
                step.classList.add('active');
                await new Promise(r => setTimeout(r, 800));
            }
        };

        // Model Cards
        pillars.forEach(p => {
            const list = p.model.includes('Opus') ? 
                document.querySelector('.opus .pillar-list') : 
                document.querySelector('.sonnet .pillar-list');
            const li = document.createElement('li');
            li.style.fontSize = '0.6rem';
            li.style.marginTop = '5px';
            li.innerText = `${p.emoji} ${p.name.split('·')[1] || p.name}`;
            list.appendChild(li);
        });

        // Chat Demo
        const chatData = [
            { name: '主公', text: '帮我写一份投资报告', side: 'master' },
            { name: '天音', text: '收到，正在为您分派任务...', side: 'ai' },
            { name: '無一郎', text: '需求已明确：Deltapex 出海战略分析。', side: 'ai' },
            { name: '忍', text: '任务已拆解，炭治郎负责技术部分，煉獄负责文案。', side: 'ai' },
            { name: '炭治郎', text: '代码分析完成，正在生成技术架构图。', side: 'ai' },
            { name: '煉獄', text: '投资建议已拟好，文辞激昂，逻辑严密！', side: 'ai' },
            { name: '义勇', text: '审核通过，报告无误。', side: 'ai' },
            { name: '天音', text: '主公，投资报告已为您准备好了，请查收。', side: 'ai' }
        ];

        const chatBox = document.getElementById('chat-messages');
        let chatIdx = 0;
        function typeChat() {
            if (chatIdx < chatData.length) {
                const msg = chatData[chatIdx];
                const div = document.createElement('div');
                div.className = `chat-bubble ${msg.side}`;
                div.innerHTML = `<div class="bubble-name">${msg.name}</div><div class="bubble-text"></div>`;
                chatBox.appendChild(div);
                
                const textElem = div.querySelector('.bubble-text');
                let charIdx = 0;
                const timer = setInterval(() => {
                    textElem.innerText += msg.text[charIdx];
                    charIdx++;
                    if (charIdx === msg.text.length) {
                        clearInterval(timer);
                        chatIdx++;
                        chatBox.scrollTop = chatBox.scrollHeight;
                        setTimeout(typeChat, 1000);
                    }
                }, 50);
            }
        }
        
        // Start chat when section is in view
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && chatIdx === 0) {
                typeChat();
            }
        }, { threshold: 0.5 });
        observer.observe(document.getElementById('case'));

    </script>
</body>
</html>
